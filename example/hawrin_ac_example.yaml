external_components:
  - source:
      type: git
      url: https://github.com/osk2/hawrin-esphome-climate.git

remote_transmitter:
  id: ir_tx
  pin: GPIO4
  carrier_duty_percent: 50%

climate:
  - platform: hawrin_ac
    id: bedroom_ac
    name: "Bedroom AC"
    transmitter_id: ir_tx
    supports_heat: false

button:
  - platform: template
    name: "Bedroom AC Display Toggle"
    on_press:
      - lambda: |-
          id(bedroom_ac).send_display_toggle();
